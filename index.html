	<script>
(async function () {
  try {
    const res = await fetch("https://idlive.falou.net/match/list?ctype=1&type=1&page=1&size=20");
    const data = await res.json();

    if (!data?.data?.list) return;

    const matches = data.data.list;

    const schema = matches.map(match => {
      const startDate = new Date(match.match_time * 1000).toISOString();

      return {
        "@context": "https://schema.org",
        "@type": "SportsEvent",
        "name": match.home_name + " vs " + match.away_name,
        "startDate": startDate,
        "eventStatus": match.status_id == 2
          ? "https://schema.org/EventInProgress"
          : match.status_id == 8 || match.status_id == 9
          ? "https://schema.org/EventCompleted"
          : "https://schema.org/EventScheduled",
        "sport": "Soccer",
        "competition": {
          "@type": "SportsOrganization",
          "name": match.competition_name
        },
        "homeTeam": {
          "@type": "SportsTeam",
          "name": match.home_name,
          "logo": match.home_logo
        },
        "awayTeam": {
          "@type": "SportsTeam",
          "name": match.away_name,
          "logo": match.away_logo
        }
      };
    });

    // inject ke head
    const script = document.createElement("script");
    script.type = "application/ld+json";
    script.text = JSON.stringify(schema, null, 2);
    document.head.appendChild(script);

  } catch (e) {
    console.log("Schema gagal dibuat");
  }
})();
</script>
